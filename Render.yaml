services:
  - type: web
    name: e2ee-messenger
    env: python
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python init_db.py
    startCommand: cd backend && gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: e2ee-db
          property: connectionString

databases:
  - name: e2ee-db
    databaseName: e2ee
    user: e2ee_user
